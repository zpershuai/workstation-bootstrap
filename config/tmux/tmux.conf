if-shell 'test -f "$HOME/.tmux/.tmux.conf"' 'source-file ~/.tmux/.tmux.conf'

# Keep tmux panes on fish even when the tmux server inherited an older login shell.
if-shell 'test -x /opt/homebrew/bin/fish' 'set-option -g default-shell /opt/homebrew/bin/fish; set-option -g default-command /opt/homebrew/bin/fish'
if-shell 'test ! -x /opt/homebrew/bin/fish && test -x /usr/local/bin/fish' 'set-option -g default-shell /usr/local/bin/fish; set-option -g default-command /usr/local/bin/fish'
